services:
  app:
    build:
      context: .
      target: development
    working_dir: /app
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "${PORT:-3000}:${PORT:-3000}"

volumes:
  node_modules:
